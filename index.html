<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support AI | Premium Intelligent HelpDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg-dark: #05070a;
            --glass-bg: rgba(17, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.125);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #05070a, #0c0a09);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }
        body::before { top: -100px; right: -100px; }
        body::after { bottom: -100px; left: -100px; background: var(--secondary); }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
        }

        .logo-container {
            position: relative;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .hinfo { flex: 1; }
        .hinfo h1 { 
            font-size: 1.25rem; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hinfo p { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

        .hbadge {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--accent);
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .gemini-badge {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(99, 102, 241, 0.2));
            border: 1px solid rgba(124, 58, 237, 0.4);
            color: #c084fc;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.2);
        }

        .api-config {
            background: rgba(0,0,0,0.3);
            padding: 8px 30px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }
        .api-config label { font-size: 0.75rem; color: var(--text-dim); }
        .api-config input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            outline: none;
            transition: 0.3s;
        }
        .api-config input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .api-config button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .api-config button:hover { transform: translateY(-1px); box-shadow: 0 5px 15px var(--primary-glow); }

        .main { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }

        .sidebar {
            width: 240px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .stitle { font-size: 0.7rem; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
        .qbtn {
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            text-align: left;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qbtn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            color: #fff;
            transform: translateX(5px);
        }

        .chat-wrap {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .msg { display: flex; gap: 14px; max-width: 80%; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .av {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .bot .av { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .user .av { background: linear-gradient(135deg, #10b981, #3b82f6); }

        .bub {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-break: break-word;
        }
        .bub strong { color: #a5b4fc; font-weight: 700; }
        .bub em { color: #93c5fd; font-style: italic; }
        .bot .bub { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-top-left-radius: 4px;
            color: #e2e8f0;
        }
        .user .bub { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-top-right-radius: 4px;
            color: #fff;
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.2);
        }

        .msg-footer { display: flex; gap: 8px; margin-top: 6px; padding-left: 52px; }
        .fb-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 5px 14px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.72rem;
            transition: all 0.25s ease;
            user-select: none;
        }
        .fb-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.05); }
        .fb-btn:disabled { cursor: default; opacity: 0.7; }
        .fb-btn.active-good { background: rgba(22, 163, 74, 0.25); border-color: #16a34a; color: #4ade80; box-shadow: 0 0 10px rgba(22,163,74,0.2); }
        .fb-btn.active-bad { background: rgba(220, 38, 38, 0.25); border-color: #dc2626; color: #f87171; box-shadow: 0 0 10px rgba(220,38,38,0.2); }
        
        .ticket-tag { font-size: 0.7rem; color: var(--text-dim); margin-left: 10px; align-self: center; }

        .input-wrap {
            padding: 20px 25px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .input-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-container input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .input-container input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
            box-shadow: 0 5px 15px var(--primary-glow);
        }
        .send-btn:hover { transform: scale(1.05) rotate(-10deg); box-shadow: 0 8px 25px var(--primary-glow); }

        .stats-bar {
            padding: 10px 25px;
            display: flex;
            gap: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.1);
        }
        .stat span { color: var(--accent); font-weight: 700; margin-left: 3px; }

        .history-panel {
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .hp-title {
            padding: 18px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hp-list { flex: 1; overflow-y: auto; padding: 15px; }
        .hp-item {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }
        .hp-item:hover { background: rgba(255,255,255,0.06); border-color: var(--glass-border); }
        .hp-item .hn { font-size: 0.7rem; color: var(--accent); margin-bottom: 5px; font-weight: 600; }
        .hp-item .hq { font-size: 0.85rem; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hp-item .hr { font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; }

        .typing-dots span { display: inline-block; width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; margin: 0 2px; animation: dot 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%, 80%, 100% { transform: scale(1); opacity: 0.3; } 40% { transform: scale(1.4); opacity: 1; } }

        @media (max-width: 1024px) {
            .history-panel { display: none; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { padding: 10px; }
            header { padding: 12px 20px; }
            .hinfo h1 { font-size: 1.1rem; }
            .hbadge { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">🖥️</div>
        <div class="hinfo">
            <h1>IT Support AI</h1>
            <p>Intelligence HelpDesk System</p>
        </div>
        <span class="hbadge" id="faqCount">Loading Knowledge...</span>
        <div class="gemini-badge" id="aiLabel">Keyword Engine</div>
    </header>

    <div class="api-config">
        <label>🤖 Gemini AI Config:</label>
        <input type="password" id="geminiKey" placeholder="วาง API Key ของ Gemini ตรงนี้ เพื่อใช้ AI ช่วยตอบ...">
        <button onclick="saveKey()">Activate AI</button>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="stitle">Quick Solutions</div>
            <button class="qbtn" onclick="ask('เครื่องพิมพ์พิมพ์ไม่ออก')" title="เครื่องพิมพ์พิมพ์ไม่ออก">🖨️ เครื่องพิมพ์</button>
            <button class="qbtn" onclick="ask('เชื่อมต่อ WiFi ไม่ได้')" title="เชื่อมต่อ WiFi ไม่ได้">📶 WiFi/เน็ต</button>
            <button class="qbtn" onclick="ask('ลืมรหัสผ่าน')" title="ลืมรหัสผ่าน / รหัสผ่านหมดอายุ">🔑 ลืมรหัสผ่าน</button>
            <button class="qbtn" onclick="ask('คอมช้ามาก')" title="คอมพิวเตอร์ทำงานช้า">💻 คอมช้า</button>
            <button class="qbtn" onclick="ask('ส่งอีเมลไม่ได้')" title="ส่งอีเมลไม่ได้ / Outlook มีปัญหา">📧 อีเมล</button>
            <button class="qbtn" onclick="ask('VPN เชื่อมต่อไม่ได้')" title="VPN เชื่อมต่อไม่ได้">🔐 VPN</button>
            <button class="qbtn" onclick="ask('Zoom กล้องไม่ทำงาน')" title="Zoom/Teams กล้องหรือไมค์ไม่ทำงาน">📹 Video Call</button>
            <button class="qbtn" onclick="ask('ไฟล์ถูกลบกู้คืนยังไง')" title="ไฟล์ถูกลบ / กู้คืนไฟล์">💾 กู้ไฟล์</button>
            <button class="qbtn" onclick="ask('Teams เปิดไม่ขึ้น')" title="Microsoft Teams เปิดไม่ขึ้น">💬 Teams</button>
            <button class="qbtn" onclick="ask('เสียบ USB แล้วไม่ขึ้น')" title="USB/อุปกรณ์ต่อพ่วงไม่ขึ้น">🔌 USB/Hardware</button>
            <button class="qbtn" onclick="ask('Map Network Drive ทำยังไง')" title="Map Network Drive / เชื่อมต่อ Shared Folder">🗂️ Network Drive</button>

            <button class="qbtn" onclick="ask('ต่อ 2 จอ Dual Monitor')" title="ตั้งค่า Dual Monitor 2 จอ">🖥️ Dual Monitor</button>
            <button class="qbtn" onclick="ask('พนักงานใหม่ต้องทำอะไร')" title="IT Onboarding สำหรับพนักงานใหม่">👤 New Employee</button>
            <button class="qbtn" onclick="ask('ติดตั้งโปรแกรมใหม่')" title="ขอติดตั้งโปรแกรม/ซอฟต์แวร์ใหม่">📦 ลงโปรแกรม</button>
        </div>

        <div class="chat-wrap">
            <div class="messages" id="messages">
                <div class="msg bot" id="welcomeMsg">
                    <div class="av">🤖</div>
                    <div class="bub" id="welcomeBub"></div>
                </div>
            </div>

            <div class="input-wrap">
                <div class="input-container">
                    <input id="inp" placeholder="พิมพ์อาการเสีย หรือปัญหาไอทีที่พบ..." onkeydown="if(event.key==='Enter')send()" autofocus>
                </div>

            <div class="stats-bar">
                <div class="stat">Tickets: <span id="sTicket">0</span></div>
                <div class="stat">Helpful: <span id="sGood">0</span></div>

            </div>

            <div class="hp-title">
                <span>🎫 Recent Tickets</span>
                <span style="font-size: 0.6rem; color: var(--accent); cursor: pointer;">View All</span>
            </div>
            <div class="hp-list" id="histList">
                <div style="padding:40px 20px;text-align:center;color:var(--text-dim);font-size:0.8rem">
                    No active tickets
                </div>
            </div>
        </div>
    </div>
    <script>
    // Load kb.js — supports both Flask (localhost) and GitHub Pages
    (function() {
        var isFlask = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        var src = isFlask ? '/static/kb.js' : 'kb.js';
        var s = document.createElement('script');
        s.src = src;
        s.defer = true;
        document.head.appendChild(s);
    })();
    </script>
    <script defer>

let geminiKey = localStorage.getItem('geminiKey') || '';
let ticketNum = 1000 + Math.floor(Math.random()*1000);
let stats = {tickets:0, good:0, bad:0};
let history = [];

if(geminiKey){ 
  document.getElementById('geminiKey').value=geminiKey; 
  setAIMode(true); 
}

function saveKey(){
  geminiKey = document.getElementById('geminiKey').value.trim();
  if(geminiKey){ 
    localStorage.setItem('geminiKey',geminiKey); 
    setAIMode(true); 
    addSys('✅ เปิดใช้ Gemini AI แล้วครับ! ตอนนี้จะตอบด้วย AI จริง'); 
  } else { 
    localStorage.removeItem('geminiKey'); 
    setAIMode(false); 
    addSys('ℹ️ ปิด Gemini AI แล้ว กลับเป็น Keyword Mode'); 
  }
}

function setAIMode(on){
  document.getElementById('aiLabel').textContent = on ? 'Gemini AI' : 'Keyword AI';
  document.getElementById('aiLabel').style.background = on ? '#7c3aed22' : '#1e40af22';
  document.getElementById('aiLabel').style.borderColor = on ? '#7c3aed55' : '#1e40af55';
  document.getElementById('aiLabel').style.color = on ? '#a78bfa' : '#60a5fa';
  document.getElementById('sMode').textContent = on ? 'Gemini AI Mode' : 'Keyword Mode';
}

function scoreKB(input){
  const u=input.toLowerCase(); let best=null,top=0;
  for(const cat of window.KB.categories){
    for(const faq of cat.faqs){
      let s=0;
      for(const kw of cat.keywords) if(u.includes(kw.toLowerCase())) s+=3;
      for(const w of u.split(' ')) if(faq.question.toLowerCase().includes(w)&&w.length>1) s+=1;
      if(s>top){top=s;best={faq,cat:cat.name};}
    }
  }
  return top>=1?best:null;
}

async function callGemini(userInput){
  const top3=[]; const u=userInput.toLowerCase();
  for(const cat of window.KB.categories){
    for(const faq of cat.faqs){
      let s=0;
      for(const kw of cat.keywords) if(u.includes(kw.toLowerCase())) s+=3;
      if(s>0) top3.push(faq);
      if(top3.length>=3) break;
    }
    if(top3.length>=3) break;
  }
  const ctx = top3.map(f=>`Q: ${f.question}\nA: ${f.answer}`).join('\n\n');
  const prompt = `คุณเป็น IT Support AI ขององค์กร ตอบคำถามสั้น ชัดเจน เป็นภาษาไทย ใช้ขั้นตอนแบบ numbered list\nถ้าไม่มีข้อมูล ให้แจ้ง: ติดต่อ IT Support ext.1234\n\nFAQ Reference:\n${ctx}\n\nคำถาม: ${userInput}\n\nตอบ:`;
  
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  if(!res.ok) throw new Error('API Error '+res.status);
  const d = await res.json();
  return d.candidates[0].content.parts[0].text;
}

function addSys(text){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.style.cssText='text-align:center;font-size:.72rem;color:#475569;padding:4px';
  d.textContent=text; w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function formatMarkdown(text) {
  let html = text.replace(/</g, '&lt;');
  // Bold: **text** (multiline safe)
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

function addMsg(text,role){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="av">${role==='bot'?'🤖':'👤'}</div><div class="bub">${formatMarkdown(text)}</div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight; return d;
}

function addFeedback(tNum){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg-footer';
  d.innerHTML=`<button class="fb-btn" id="g${tNum}" onclick="feedback('${tNum}',1)">👍 มีประโยชน์</button><button class="fb-btn" id="b${tNum}" onclick="feedback('${tNum}',-1)">👎 ไม่ตรง</button><span class="ticket-tag">#${tNum}</span>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function feedback(tNum,val){
  const g=document.getElementById('g'+tNum), b=document.getElementById('b'+tNum);
  if(!g||!b||g.disabled) return; // prevent double click
  g.disabled=true; b.disabled=true;
  g.className='fb-btn'+(val===1?' active-good':'');
  b.className='fb-btn'+(val===-1?' active-bad':'');
  // Micro-animation on active button
  const activeBtn = val===1?g:b;
  activeBtn.style.transform='scale(1.15)';
  setTimeout(()=>activeBtn.style.transform='scale(1)',250);
  if(val===1){stats.good++;document.getElementById('sGood').textContent=stats.good;}
  else{stats.bad++;document.getElementById('sBad').textContent=stats.bad;}
  const h=history.find(x=>x.ticket==tNum);
  if(h) h.feedback=val>0?'👍':'👎';
  renderHistory();
}

function addTyping(){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg bot'; d.id='typing';
  d.innerHTML='<div class="av">🤖</div><div class="bub"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function renderHistory(){
  const el=document.getElementById('histList');
  if(!history.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#475569;font-size:.78rem">ยังไม่มี Ticket</div>';return;}
  el.innerHTML=[...history].reverse().map(h=>`<div class="hp-item"><div class="hn">#${h.ticket} • ${h.time} ${h.feedback||''}</div><div class="hq">${h.question}</div><div class="hr">${h.mode}</div></div>`).join('');
}

function ask(q){document.getElementById('inp').value=q;send();}

async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; addMsg(text,'user');
  const tNum=++ticketNum; stats.tickets++;
  document.getElementById('sTicket').textContent=stats.tickets;
  addTyping();
  const now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  let reply='', mode='Keyword';
  
  try {
    if (window.location.protocol !== 'file:' && !window.location.hostname.includes('github.io')) {
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        if (res.ok) {
          const data = await res.json();
          reply = data.response;
          mode = data.engine || 'RAG Server';
        }
      } catch (e) {
        console.log('Backend fallback', e);
      }
    }

    if (!reply && geminiKey) {
      mode = 'Gemini AI';
      reply = await callGemini(text);
    } 
    
    if (!reply) {
      await new Promise(r=>setTimeout(r,700+Math.random()*500));
      const m = scoreKB(text);
      reply = m ? `📋 **${m.faq.question}**\n\n${m.faq.answer}` : window.KB.escalation.message;
      mode = 'Keyword';
    }
  } catch(e){
    reply = '⚠️ ระบบขัดข้อง: ' + e.message;
    mode = 'Error';
  }
  
  document.getElementById('typing')?.remove();
  addMsg(reply,'bot');
  addFeedback(tNum);
  history.push({ticket:tNum,question:text,time:now,mode,feedback:''});
  renderHistory();
}

document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

function initUI() {
  const maxTries = 20;
  let tries = 0;
  
  const checkKB = setInterval(() => {
    tries++;
    if (window.KB) {
      clearInterval(checkKB);
      console.log('KB loaded successfully after', tries, 'tries');
      renderUI();
    } else if (tries >= maxTries) {
      clearInterval(checkKB);
      console.error('KB failed to load after maximum retries');
      const faqEl = document.getElementById('faqCount');
      if (faqEl) faqEl.textContent = 'Error: No KB Found';
    }
  }, 100);
}

function renderUI() {
  try {
    const totalFaq = window.KB.categories.reduce((sum, cat) => sum + cat.faqs.length, 0);
    const totalCat = window.KB.categories.length;
    
    const faqEl = document.getElementById('faqCount');
    if (faqEl) faqEl.textContent = totalFaq + ' FAQ | ' + totalCat + ' หมวด';
    
    const topCats = window.KB.categories.slice(0, 5).map(c => c.name).join(', ');
    const wb = document.getElementById('welcomeBub');
    if (wb) {
      wb.innerHTML = 'สวัสดีครับ! 👋 ผม <strong>IT Support AI</strong> ยินดีให้บริการครับ<br><br>'
        + '📊 ฐานข้อมูลปัจจุบัน: <strong>' + totalFaq + ' คำถาม</strong> ใน <strong>' + totalCat + ' หมวด</strong><br>'
        + '📂 หมวดหมู่หลัก: ' + topCats + '<br><br>'
        + '💡 พิมพ์ปัญหาของคุณ หรือเลือกจากเมนูด้านซ้ายได้เลยครับ';
    }
  } catch (err) {
    console.error('Render UI error:', err);
  }
}

// Start initialization
initUI();
</script>
</body>
</html>
