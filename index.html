<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support AI | Premium Intelligent HelpDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #a855f7;
            --accent: #22d3ee;
            --bg-dark: #05070a;
            --glass-bg: rgba(17, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.125);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        /* ===================== LIGHT MODE ===================== */
        body.light {
            --glass-bg:     rgba(226, 232, 240, 0.75);
            --glass-border: rgba(100, 116, 139, 0.22);
            --text-main:    #0f172a;
            --text-dim:     #334155;
            --primary:      #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --secondary:    #7c3aed;
            --accent:       #0ea5e9;
            background: linear-gradient(135deg, #dde4f0 0%, #e8edf7 40%, #d4dff0 100%) !important;
        }
        /* Glow orbs lighter */
        body.light::before { background: #6366f1; opacity: 0.06; }
        body.light::after  { background: #a855f7; opacity: 0.05; }

        /* Header */
        body.light header {
            background: rgba(255,255,255,0.72);
            border-bottom: 1px solid rgba(99,102,241,0.18);
        }
        body.light header h1 { color: #1e1b4b; }
        body.light header p  { color: #475569; }

        /* Sidebar */
        body.light .sidebar {
            background: rgba(255,255,255,0.65);
            border-color: rgba(99,102,241,0.15);
        }
        body.light .stitle { color: #6366f1; }
        body.light .qbtn {
            color: #1e293b;
            background: rgba(255,255,255,0.5);
            border-color: rgba(148,163,184,0.25);
        }
        body.light .qbtn:hover {
            background: rgba(99,102,241,0.12);
            border-color: rgba(99,102,241,0.35);
            border-left-color: #4f46e5;
            color: #312e81;
            box-shadow: 0 2px 10px rgba(99,102,241,0.15);
        }

        /* Chat area */
        body.light .chat-wrap {
            background: rgba(241,245,249,0.80);
            border-color: rgba(99,102,241,0.15);
            box-shadow: 0 10px 40px rgba(99,102,241,0.15);
        }
        /* Bot bubble */
        body.light .bot .bub {
            background: rgba(255,255,255,0.90);
            color: #1e293b;
            border: 1px solid rgba(99,102,241,0.14);
            box-shadow: 0 2px 8px rgba(79,70,229,0.07);
        }
        body.light .bot .bub strong { color: #312e81; }
        /* User bubble */
        body.light .user .bub { color: #fff; }

        /* Input area */
        body.light .input-wrap {
            background: rgba(226,232,240,0.85);
            border-top: 1px solid rgba(99,102,241,0.15);
        }
        body.light #inp {
            background: rgba(255,255,255,0.90);
            color: #0f172a;
            border: 1px solid rgba(99,102,241,0.25);
        }
        body.light #inp::placeholder { color: #94a3b8; }

        /* Stats bar */
        body.light .stats-bar {
            background: rgba(215,224,238,0.70);
            border-top: 1px solid rgba(99,102,241,0.10);
            color: #475569;
        }
        body.light .stat span { color: #312e81; }

        /* History panel */
        body.light .history-panel {
            background: rgba(255,255,255,0.65);
            border-color: rgba(99,102,241,0.15);
        }
        body.light .hp-title { color: #312e81; border-bottom-color: rgba(99,102,241,0.15); }
        body.light .hp-item {
            background: rgba(238,242,255,0.80);
            border: 1px solid rgba(99,102,241,0.12);
        }
        body.light .hp-item:hover { background: rgba(224,231,255,0.90); }
        body.light .hp-item .hq { color: #1e293b; font-weight: 600; }
        body.light .hp-item .hm { color: #475569; }

        /* Badges & labels */
        body.light .hbadge {
            background: rgba(79,70,229,0.12);
            color: #312e81;
            border-color: rgba(79,70,229,0.25);
        }
        body.light .gemini-badge { color: #4f46e5; border-color: rgba(79,70,229,0.3); background: rgba(79,70,229,0.10); }

        /* ---- Header buttons (override inline styles) ---- */
        body.light header button {
            background: rgba(255,255,255,0.70) !important;
            border: 1px solid rgba(99,102,241,0.30) !important;
            color: #312e81 !important;
        }
        body.light header button:hover {
            background: rgba(99,102,241,0.15) !important;
            color: #1e1b4b !important;
        }
        /* hbadge (FAQ count) */
        body.light .hbadge {
            background: rgba(79,70,229,0.12) !important;
            color: #312e81 !important;
            border-color: rgba(79,70,229,0.28) !important;
            font-weight: 700;
        }

        /* Feedback & copy buttons */
        body.light .fb-btn { color: #475569; border-color: rgba(148,163,184,0.4); }
        body.light .fb-btn:hover { background: rgba(99,102,241,0.1); color: #312e81; }
        body.light .copy-btn { color: #6366f1; }
        body.light .ticket-tag { color: #7c3aed; }

        /* Expand button */
        body.light .expand-btn { color: #4f46e5; }

        /* Sys message */
        body.light div[style*="text-align:center"] { color: #64748b !important; }

        /* Scrollbar */
        body.light .messages::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); }
        body.light .sidebar::-webkit-scrollbar-thumb  { background: rgba(99,102,241,0.2); }

        /* Clear chat button in light mode */
        body.light .clear-btn {
            background: rgba(255,255,255,0.55);
            border-color: rgba(99,102,241,0.25);
            color: #475569;
        }
        body.light .clear-btn:hover {
            background: rgba(239,68,68,0.10);
            border-color: rgba(239,68,68,0.35);
            color: #b91c1c;
        }

        /* ---- Sidebar Search ---- */
        .sidebar-search { margin-bottom: 15px; }
        .sidebar-search input {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); color: #e2e8f0;
            padding: 8px 12px; border-radius: 8px; font-size: 0.8rem;
            outline: none; transition: 0.3s; font-family: 'Outfit', sans-serif;
        }
        .sidebar-search input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .sidebar-search input::placeholder { color: var(--text-dim); }
        body.light .sidebar-search input { background: rgba(255,255,255,0.7); border-color: rgba(99,102,241,0.25); color: #0f172a; }

        /* ---- Quick Reply Chips ---- */
        .quick-chips-wrap { padding-left: 52px; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .chip-btn {
            background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
            color: #a5b4fc; padding: 6px 14px; border-radius: 20px;
            font-size: 0.75rem; cursor: pointer; transition: 0.2s; font-family: 'Outfit', sans-serif;
        }
        .chip-btn:hover { background: rgba(99,102,241,0.3); color: #fff; transform: translateY(-1px); }
        body.light .chip-btn { background: rgba(99,102,241,0.08); color: #4f46e5; border-color: rgba(99,102,241,0.25); }
        body.light .chip-btn:hover { background: rgba(99,102,241,0.18); color: #312e81; }

        /* ---- Gemini AI Config panel ---- */
        body.light .api-config {
            background: rgba(238,242,255,0.92) !important;
            border-bottom: 1px solid rgba(99,102,241,0.20) !important;
        }
        body.light .api-config label {
            color: #312e81 !important;
            font-weight: 600;
        }
        body.light .api-config input {
            background: rgba(255,255,255,0.95) !important;
            border: 1px solid rgba(99,102,241,0.30) !important;
            color: #0f172a !important;
        }
        body.light .api-config input::placeholder {
            color: #94a3b8 !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #05070a, #0c0a09);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }
        body::before { top: -100px; right: -100px; }
        body::after { bottom: -100px; left: -100px; background: var(--secondary); }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
        }

        .logo-container {
            position: relative;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .hinfo { flex: 1; }
        .hinfo h1 { 
            font-size: 1.25rem; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hinfo p { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }

        .hbadge {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--accent);
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .gemini-badge {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(99, 102, 241, 0.2));
            border: 1px solid rgba(124, 58, 237, 0.4);
            color: #c084fc;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 10px;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.2);
        }

        .api-config {
            background: rgba(0,0,0,0.4);
            padding: 0 30px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.35s ease, padding 0.35s ease;
        }
        .api-config.open {
            max-height: 60px;
            padding: 10px 30px;
        }
        .api-config label { font-size: 0.75rem; color: var(--text-dim); }
        .api-config input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            outline: none;
            transition: 0.3s;
        }
        .api-config input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .api-config button {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .api-config button:hover { transform: translateY(-1px); box-shadow: 0 5px 15px var(--primary-glow); }

        .main { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }

        .sidebar {
            width: 210px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .stitle {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 6px;
            padding: 0 8px;
        }
        .qbtn {
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            border-left: 3px solid transparent;
            color: var(--text-dim);
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.82rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            text-align: left;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.3;
            width: 100%;
        }
        .qbtn:hover {
            background: rgba(99, 102, 241, 0.12);
            border-color: rgba(99, 102, 241, 0.25);
            border-left-color: var(--primary);
            color: #fff;
            transform: translateX(4px);
            box-shadow: 0 2px 12px rgba(99,102,241,0.15);
        }
        .qbtn:active {
            transform: translateX(2px) scale(0.98);
        }

        .chat-wrap {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .messages::-webkit-scrollbar { width: 5px; }
        .messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .msg { display: flex; gap: 14px; max-width: 80%; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        
        .av {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .bot .av { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .user .av { background: linear-gradient(135deg, #10b981, #3b82f6); }

        .bub {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            word-break: break-word;
        }
        .bub strong { color: #a5b4fc; font-weight: 700; }
        .bub em { color: #93c5fd; font-style: italic; }
        .bot .bub { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-top-left-radius: 4px;
            color: #e2e8f0;
        }
        .user .bub { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-top-right-radius: 4px;
            color: #fff;
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.2);
        }

        .msg-footer { display: flex; gap: 8px; margin-top: 6px; padding-left: 52px; align-items: center; }
        .copy-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.68rem;
            transition: all 0.2s;
            margin-left: auto;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .fb-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 5px 14px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.72rem;
            transition: all 0.25s ease;
            user-select: none;
        }
        .fb-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.05); }
        .fb-btn:disabled { cursor: default; opacity: 0.7; }
        .fb-btn.active-good { background: rgba(22, 163, 74, 0.25); border-color: #16a34a; color: #4ade80; box-shadow: 0 0 10px rgba(22,163,74,0.2); }
        .fb-btn.active-bad { background: rgba(220, 38, 38, 0.25); border-color: #dc2626; color: #f87171; box-shadow: 0 0 10px rgba(220,38,38,0.2); }
        
        .ticket-tag { font-size: 0.7rem; color: var(--text-dim); margin-left: 10px; align-self: center; }

        .input-wrap {
            padding: 20px 25px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .input-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-container input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 15px 20px;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .input-container input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: 0.3s;
            box-shadow: 0 5px 15px var(--primary-glow);
            opacity: 0.5;
            pointer-events: none;
        }
        .send-btn.active {
            opacity: 1;
            pointer-events: auto;
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 5px 15px var(--primary-glow); }
            50% { box-shadow: 0 5px 25px var(--primary); }
            100% { box-shadow: 0 5px 15px var(--primary-glow); }
        }
        .send-btn:hover { transform: scale(1.05) rotate(-10deg); box-shadow: 0 8px 25px var(--primary-glow); animation: none; }

        .stats-bar {
            padding: 10px 25px;
            display: flex;
            gap: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.1);
        }
        .stat span { color: var(--accent); font-weight: 700; margin-left: 3px; }

        .history-panel {
            width: 300px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .hp-title {
            padding: 18px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hp-list { flex: 1; overflow-y: auto; padding: 15px; }
        .hp-item {
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }
        .hp-item:hover { background: rgba(255,255,255,0.06); border-color: var(--glass-border); }
        .hp-item .hn { font-size: 0.7rem; color: var(--accent); margin-bottom: 5px; font-weight: 600; }
        .hp-item .hq { font-size: 0.85rem; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hp-item .hr { font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; }

        .typing-dots span { display: inline-block; width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; margin: 0 2px; animation: dot 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot { 0%, 80%, 100% { transform: scale(1); opacity: 0.3; } 40% { transform: scale(1.4); opacity: 1; } }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes typeCursor { 0%,100%{opacity:1} 50%{opacity:0} }

        /* Scroll to bottom button */
        .scroll-btn {
            position: absolute;
            bottom: 90px;
            right: 20px;
            width: 36px;
            height: 36px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.3s;
            z-index: 10;
        }
        .scroll-btn.visible { display: flex; }
        .scroll-btn:hover { transform: scale(1.1); }

        /* Clear chat button */
        .clear-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 4px 10px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.68rem;
            transition: all 0.2s;
        }
        .clear-btn:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; }

        /* Collapsible long answers */
        .bub.collapsed { max-height: 150px; overflow: hidden; position: relative; }
        .bub.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;

function scoreKB(input){
  const u=input.toLowerCase(); let best=null,top=0;
  for(const cat of window.KB.categories){
    for(const faq of cat.faqs){
      let s=0;
      for(const kw of cat.keywords) if(u.includes(kw.toLowerCase())) s+=3;
      for(const w of u.split(' ')) if(faq.question.toLowerCase().includes(w)&&w.length>1) s+=1;
      if(s>top){top=s;best={faq,cat:cat.name};}
    }
  }
  return top>=1?best:null;
}

async function callGemini(userInput){
  const top3=[]; const u=userInput.toLowerCase();
  for(const cat of window.KB.categories){
    for(const faq of cat.faqs){
      let s=0;
      for(const kw of cat.keywords) if(u.includes(kw.toLowerCase())) s+=3;
      if(s>0) top3.push(faq);
      if(top3.length>=3) break;
    }
    if(top3.length>=3) break;
  }
  const ctx = top3.map(f=>`Q: ${f.question}\nA: ${f.answer}`).join('\n\n');
  
  const langPrompt = currentLang === 'en' 
    ? 'STRICTLY respond in English. Do not use Thai in the answer.' 
    : 'ตอบเป็นภาษาไทย สั้น ชัดเจน เป็นกันเอง และสุภาพ';
    
  const prompt = `You are a Corporate IT Support AI. ${langPrompt} Use numbered lists for steps.
If no info is found, say: Please contact IT Support ext.1234

Context (This is from our Thai KB, please translate the relevant parts to English for your response):
${ctx}

User Question: ${userInput}

Answer:`;
  
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  if(!res.ok) throw new Error('API Error '+res.status);
  const d = await res.json();
  return d.candidates[0].content.parts[0].text;
}

function addSys(text){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.style.cssText='text-align:center;font-size:.72rem;color:#475569;padding:4px';
  d.textContent=text; w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function formatMarkdown(text) {
  let html = text.replace(/</g, '&lt;');
  // Bold: **text** (multiline safe)
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic: *text*
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Line breaks
  html = html.replace(/\n/g, '<br>');
  return html;
}

  const w=document.getElementById('messages');

  if(!btn) return;
  const distFromBottom = w.scrollHeight - w.scrollTop - w.clientHeight;
  if(distFromBottom > 120) btn.classList.add('visible');
  else btn.classList.remove('visible');
}

// Typewriter animation for bot messages
function typeWrite(el, html, speed=12) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const plainText = tmp.textContent || '';
  const fullHTML = html;
  let i = 0;
  el.classList.add('typing-cursor');
  const interval = setInterval(() => {
    i += 2; // 2 chars per tick for speed
    if(i >= plainText.length) {
      clearInterval(interval);
      el.classList.remove('typing-cursor');
      el.innerHTML = fullHTML;
      // Collapse long answers
      if(el.scrollHeight > 180) {
        el.classList.add('collapsed');
        const btn = document.createElement('button');
        btn.className = 'expand-btn';
        btn.textContent = translations[currentLang].btnViewFull;
        btn.onclick = function(){
          if(el.classList.contains('collapsed')){
            el.classList.remove('collapsed');
            btn.textContent = translations[currentLang].btnCollapse;
          } else {
            el.classList.add('collapsed');
            btn.textContent = translations[currentLang].btnViewFull;
          }
        };
        el.after(btn);
      }
      const w=document.getElementById('messages');
      w.scrollTop=w.scrollHeight;
      checkScrollBtn();
    } else {
      // Show partial plain text during typing
      el.textContent = plainText.slice(0, i);
      const w=document.getElementById('messages');
      w.scrollTop=w.scrollHeight;
    }
  }, speed);
}

function addMsg(text, role){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg '+role;
  const bub = document.createElement('div');
  bub.className='bub';
  let avIcon = role==='bot'?'🤖':(role==='admin'?'👨‍💻':'👤');
  d.innerHTML=`<div class="av">${avIcon}</div>`;
  d.appendChild(bub);
  w.appendChild(d);
  if(role==='bot' || role==='admin'){
    typeWrite(bub, formatMarkdown(text));
  } else {
    bub.innerHTML = formatMarkdown(text);
    w.scrollTop=w.scrollHeight;
  }
  return d;
}

function addFeedback(tNum, botText){
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg-footer';
  d.innerHTML=`<button class="fb-btn" id="g${tNum}" onclick="feedback('${tNum}',1)">${translations[currentLang].btnGood}</button><button class="fb-btn" id="b${tNum}" onclick="feedback('${tNum}',-1)">${translations[currentLang].btnBad}</button><span class="ticket-tag">#${tNum}</span><button class="copy-btn" onclick="copyAnswer('${tNum}')" id="cp${tNum}">${translations[currentLang].btnCopy}</button>`;
  
  const chips = document.createElement('div');
  chips.className = 'quick-chips-wrap';
  chips.innerHTML = `<button class="chip-btn" onclick="ask('${translations[currentLang].chipSolved}')">${translations[currentLang].chipSolved}</button>
                     <button class="chip-btn" onclick="ask('${translations[currentLang].chipNotSolved}')">${translations[currentLang].chipNotSolved}</button>
                     <button class="chip-btn" onclick="ask('${translations[currentLang].chipContact}')">${translations[currentLang].chipContact}</button>`;

  // store text for copy
  if(botText) window['_answer_'+tNum] = botText;
  w.appendChild(d); 
  w.appendChild(chips);
  w.scrollTop=w.scrollHeight;
}

function copyAnswer(tNum){
  const text = window['_answer_'+tNum] || '';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('cp'+tNum);
    if(btn){ btn.textContent=translations[currentLang].btnCopied; btn.style.color='#4ade80'; setTimeout(()=>{btn.textContent=translations[currentLang].btnCopy; btn.style.color='';},2000); }
  });
}

function toggleAIConfig(){
  const el = document.querySelector('.api-config');
  el.classList.toggle('open');
  if(el.classList.contains('open')){
    setTimeout(()=>document.getElementById('geminiKey').focus(), 350);
  }
}

function feedback(tNum,val){
  const g=document.getElementById('g'+tNum), b=document.getElementById('b'+tNum);
  if(!g||!b||g.disabled) return; // prevent double click
  g.disabled=true; b.disabled=true;
  g.className='fb-btn'+(val===1?' active-good':'');
  b.className='fb-btn'+(val===-1?' active-bad':'');
  // Micro-animation on active button
  const activeBtn = val===1?g:b;
  activeBtn.style.transform='scale(1.15)';
  setTimeout(()=>activeBtn.style.transform='scale(1)',250);
  if(val===1){stats.good++;document.getElementById('sGood').textContent=stats.good;}
  else{stats.bad++;document.getElementById('sBad').textContent=stats.bad;}
  const h=history.find(x=>x.ticket==tNum);
  if(h) h.feedback=val>0?'👍':'👎';
  renderHistory();
  // Save to localStorage
  localStorage.setItem('itbot_stats', JSON.stringify(stats));
  localStorage.setItem('itbot_history', JSON.stringify(history.slice(-20)));
}

function filterCats() {
  const query = document.getElementById('catSearch').value.toLowerCase();
  const btns = document.querySelectorAll('.sidebar .qbtn');
  btns.forEach(btn => {
    const text = (btn.textContent || btn.innerText).toLowerCase();
    if(text.includes(query)) {
      btn.style.display = "";
    } else {
      btn.style.display = "none";
    }
  });
}

function addTyping(role='bot'){
  document.getElementById('typing')?.remove();
  const w=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg ' + role; d.id='typing';
  let icon = role==='admin' ? '👨‍💻' : '🤖';
  d.innerHTML=`<div class="av">${icon}</div><div class="bub"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  w.appendChild(d); w.scrollTop=w.scrollHeight;
}

function renderHistory(){
  const el=document.getElementById('histList');
  if(!history.length){el.innerHTML=`<div style="padding:20px;text-align:center;color:#475569;font-size:.78rem">${translations[currentLang].histEmpty}</div>`;return;}
  el.innerHTML=[...history].reverse().map(h=>`<div class="hp-item"><div class="hn">#${h.ticket} • ${h.time} ${h.feedback||''}</div><div class="hq">${h.question}</div><div class="hr">${h.mode}</div></div>`).join('');
}

function ask(q){document.getElementById('inp').value=q;send();}

async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; addMsg(text,'user');
  const tNum=++ticketNum; stats.tickets++;
  document.getElementById('sTicket').textContent=stats.tickets;
  addTyping();
  const now=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  let reply='', mode='Keyword';
  
  const lowerText = text.toLowerCase();
  const isClosing = lowerText.includes('ขอบคุณ') || lowerText.includes('แก้ไขได้แล้ว') || lowerText.includes('เรียบร้อย') || lowerText.includes('โอเค') ||
                    lowerText.includes('thanks') || lowerText.includes('thank you') || lowerText.includes('solved') || lowerText.includes('it works') || lowerText.includes('ok');

  if (isClosing) {
    reply = translations[currentLang].closingMsg;
    mode = 'System';
  } else {
    try {
      if (window.location.protocol !== 'file:' && !window.location.hostname.includes('github.io')) {
        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
          });
          if (res.ok) {
            const data = await res.json();
            reply = data.response;
            mode = data.engine || 'RAG Server';
          }
        } catch (e) {
          console.log('Backend fallback', e);
        }
      }

      if (!reply && geminiKey) {
        mode = 'Gemini AI';
        reply = await callGemini(text);
      } 
      
      if (!reply) {
        await new Promise(r=>setTimeout(r,700+Math.random()*500));
        const m = scoreKB(text);
        if (m) {
          reply = `📋 **${m.faq.question}**\n\n${m.faq.answer}`;
          // If in English mode but Keyword result is Thai, try translating if API key exists
          if (currentLang === 'en' && geminiKey) {
            try {
              const transPrompt = `Translate this IT Support FAQ to professional English:\n\n${reply}`;
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,{
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({contents:[{parts:[{text:transPrompt}]}]})
              });
              if(res.ok){
                const d = await res.json();
                reply = d.candidates[0].content.parts[0].text;
                mode = 'Keyword (Translated)';
              }
            } catch(e) { console.error('Translation error', e); }
          } else if (currentLang === 'en') {
             // Disclaimer if no API key for translation
             reply = `*(Note: Knowledge Base is only in Thai for Keyword Mode)*\n\n` + reply;
          }
        } else {
          reply = translations[currentLang].escalationMsg;
        }
        mode = 'Keyword';
      }
    } catch(e){
      reply = translations[currentLang].sysError + e.message;
      mode = 'Error';
    }
  }
  
  document.getElementById('typing')?.remove();
  addMsg(reply,'bot');
  addFeedback(tNum, reply);
  history.push({ticket:tNum,question:text,time:now,mode,feedback:''});
  renderHistory();
  // Save to localStorage
  stats.tickets = parseInt(document.getElementById('sTicket').textContent);
  localStorage.setItem('itbot_stats', JSON.stringify(stats));
  localStorage.setItem('itbot_history', JSON.stringify(history.slice(-20)));

  // Sync to HelpDesk Pro Dashboard via LocalStorage
  let hdTickets = JSON.parse(localStorage.getItem('helpdesk_tickets') || '[]');
  
  let lastTicket = hdTickets.length > 0 ? hdTickets[hdTickets.length - 1] : null;
  let newStatus = isClosing ? 'closed' : 'open';

  if (lastTicket && (lastTicket.status === 'open' || lastTicket.status === 'progress')) {
    // Append to existing active ticket
    lastTicket.messages.push({ role: 'user', text: text });
    lastTicket.messages.push({ role: 'bot', text: reply });
    if (isClosing) lastTicket.status = 'closed';
    else lastTicket.status = 'open'; // Switch back to open if admin was progressing
  } else {
    // Create new ticket
    let priority = (text.includes('ไม่') || text.includes('ด่วน') || text.includes('พัง') || text.includes('ลืม')) ? 'critical' : 'medium';
    let category = 'General';
    if(text.toLowerCase().includes('ปริ้น') || text.toLowerCase().includes('พิมพ์')) category = 'Hardware';
    if(text.toLowerCase().includes('เน็ต') || text.toLowerCase().includes('vpn') || text.toLowerCase().includes('wifi')) category = 'Network';
    if(text.toLowerCase().includes('รหัส') || text.toLowerCase().includes('password')) category = 'Security';
    
    hdTickets.push({
      id: `INC-${tNum}`,
      time: now,
      title: text,
      priority: priority,
      status: newStatus,
      category: category,
      messages: [
        { role: 'user', text: text },
        { role: 'bot', text: reply }
      ]
    });
  }
  
  // Keep only latest 50 tickets
  if(hdTickets.length > 50) hdTickets = hdTickets.slice(-50);
  localStorage.setItem('helpdesk_tickets', JSON.stringify(hdTickets));
}

// Listen for Admin replies and typing from Dashboard
window.addEventListener('storage', (e) => {
  if (e.key === 'helpdesk_tickets') {
    const oldData = JSON.parse(e.oldValue || '[]');
    const newData = JSON.parse(e.newValue || '[]');
    if (newData.length > 0 && oldData.length > 0) {
      const latestNew = newData[newData.length - 1];
      const latestOld = oldData[oldData.length - 1];
      if (latestNew.id === latestOld.id && latestNew.messages.length > latestOld.messages.length) {
        const newMsg = latestNew.messages[latestNew.messages.length - 1];
        if (newMsg.role === 'admin') {
          document.getElementById('typing')?.remove();
          addMsg(newMsg.text, 'admin');
        }
      }
    }
  }
  
  if (e.key === 'admin_typing') {
    const data = JSON.parse(e.newValue || '{}');
    if (data.typing) {
      addTyping('admin');
    } else {
      document.getElementById('typing')?.remove();
    }
  }
});

document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

function initUI() {
  const maxTries = 20;
  let tries = 0;
  
  const checkKB = setInterval(() => {
    tries++;
    if (window.KB) {
      clearInterval(checkKB);
      console.log('KB loaded successfully after', tries, 'tries');
      renderUI();
    } else if (tries >= maxTries) {
      clearInterval(checkKB);
      console.error('KB failed to load after maximum retries');
      const faqEl = document.getElementById('faqCount');
      if (faqEl) faqEl.textContent = 'Error: No KB Found';
    }
  }, 100);

  if (window.innerWidth > 768) {
    document.getElementById('inp').focus();
  }
}

function renderUI() {
  try {
    const totalFaq = window.KB.categories.reduce((sum, cat) => sum + cat.faqs.length, 0);
    const totalCat = window.KB.categories.length;
    
    const faqEl = document.getElementById('faqCount');
    if (faqEl) {
      faqEl.textContent = totalFaq + ' FAQ | ' + totalCat + (currentLang === 'th' ? ' หมวด' : ' Cats');
    }
    
    const topCats = window.KB.categories.slice(0, 5).map(c => c.name).join(', ');
    const wb = document.getElementById('welcomeBub');
    if (wb) {
      wb.innerHTML = translations[currentLang].welcomeTitle + '<br><br>'
        + translations[currentLang].welcomeStats.replace('{faq}', totalFaq).replace('{cat}', totalCat) + '<br>'
        + translations[currentLang].welcomeCats + topCats + '<br><br>'
        + translations[currentLang].welcomeAction;
    }
  } catch (err) {
    console.error('Render UI error:', err);
  }
}

// Start initialization
initUI();
</script>
